services:
  init:
    build:
      context: .
      target: init
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-hunter@ordoschools.com,sheila@ordoschools.com}
      SEED_ON_DEPLOY: ${SEED_ON_DEPLOY:-false}
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-hunter@ordoschools.com,sheila@ordoschools.com}
      S3_BUCKET: ${S3_BUCKET:-hq-space}
      S3_REGION: ${S3_REGION:-sfo3}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://sfo3.digitaloceanspaces.com}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
    volumes:
      - uploads:/app/public/uploads

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  uploads:
  caddy_data:
  caddy_config:
