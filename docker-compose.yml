x-app: &app
  image: ghcr.io/snicolin/ordo-hq:${IMAGE_TAG:-latest}
  restart: unless-stopped
  expose:
    - "3000"
  environment:
    DATABASE_URL: postgresql://ordo:${POSTGRES_PASSWORD:-ordo_dev_password}@db:5432/ordo_hq
    AUTH_SECRET: ${AUTH_SECRET}
    AUTH_URL: ${AUTH_URL:-https://hq.ordo.com}
    AUTH_TRUST_HOST: "true"
    GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ADMIN_EMAILS: ${ADMIN_EMAILS:-hunter@ordoschools.com,sheila@ordoschools.com}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    S3_BUCKET: ${S3_BUCKET:-hq-space}
    S3_REGION: ${S3_REGION:-sfo3}
    S3_ENDPOINT: ${S3_ENDPOINT:-https://sfo3.digitaloceanspaces.com}
    S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
    S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
  volumes:
    - uploads:/app/public/uploads

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ordo_hq
      POSTGRES_USER: ordo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ordo_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordo -d ordo_hq"]
      interval: 5s
      timeout: 5s
      retries: 5

  blue:
    <<: *app
    container_name: ordo-hq-blue

  green:
    <<: *app
    container_name: ordo-hq-green

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
